name = "defineperspective"
compatibility_date = "2026-04-01"
# No "node_compat" needed for Next.js 15+ Workers Builds generally, but "nodejs_als" can help.
compatibility_flags = ["nodejs_als"]

pages_build_output_dir = ".next"

[vars]
# Ensure Next.js knows it's on Cloudflare
NEXT_TELEMETRY_DISABLED = "1"

[build]
command = "npm run build"
path = ".next"
